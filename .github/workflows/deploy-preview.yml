name: Deploy Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - closed
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to deploy or clean up
        required: true
        type: string
      action:
        description: deploy or cleanup
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - cleanup

permissions:
  contents: read
  deployments: write

concurrency:
  group: preview-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  preview-context:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.context.outputs.pr_number }}
      namespace: ${{ steps.context.outputs.namespace }}
      release: ${{ steps.context.outputs.release }}
      should_deploy: ${{ steps.context.outputs.should_deploy }}
      should_cleanup: ${{ steps.context.outputs.should_cleanup }}
    steps:
      - name: Determine preview context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          LABEL_NAME: ${{ github.event.label.name }}
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          MANUAL_ACTION: ${{ inputs.action }}
        run: |
          python - <<'PY'
          import json
          import os

          event_name = os.environ.get("EVENT_NAME", "")
          action = os.environ.get("ACTION", "")
          label_name = os.environ.get("LABEL_NAME", "")
          labels = json.loads(os.environ.get("LABELS_JSON", "[]") or "[]")
          pr_number = os.environ.get("PR_NUMBER")
          manual_action = os.environ.get("MANUAL_ACTION", "")

          should_deploy = "false"
          should_cleanup = "false"

          if event_name == "workflow_dispatch":
              should_deploy = "true" if manual_action == "deploy" else "false"
              should_cleanup = "true" if manual_action == "cleanup" else "false"
          else:
              if action in {"opened", "reopened", "synchronize", "labeled"} and "internal-preview" in labels:
                  should_deploy = "true"
              if action == "closed" or (action == "unlabeled" and label_name == "internal-preview"):
                  should_cleanup = "true"

          namespace = f"ukde-pr-{pr_number}"
          release = f"ukde-pr-{pr_number}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"pr_number={pr_number}\n")
              output.write(f"namespace={namespace}\n")
              output.write(f"release={release}\n")
              output.write(f"should_deploy={should_deploy}\n")
              output.write(f"should_cleanup={should_cleanup}\n")
          PY

  deploy:
    needs: preview-context
    if: ${{ needs.preview-context.outputs.should_deploy == 'true' && vars.INTERNAL_REGISTRY != '' && vars.INTERNAL_IMAGE_NAMESPACE != '' }}
    runs-on:
      - self-hosted
      - linux
      - internal
    environment: preview
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify internal deploy tooling
        run: |
          helm version
          kubectl version --client=true

      - name: Deploy internal preview
        run: |
          helm upgrade --install "${{ needs.preview-context.outputs.release }}" infra/helm/ukde \
            --namespace "${{ needs.preview-context.outputs.namespace }}" \
            --create-namespace \
            -f infra/helm/ukde/values.yaml \
            -f infra/helm/ukde/values-preview.yaml \
            --set global.imageTag="${GITHUB_SHA::12}" \
            --set global.internalRegistry="${{ vars.INTERNAL_REGISTRY }}" \
            --set services.web.image.repository="${{ vars.INTERNAL_IMAGE_NAMESPACE }}/web" \
            --set services.api.image.repository="${{ vars.INTERNAL_IMAGE_NAMESPACE }}/api" \
            --set services.workers.image.repository="${{ vars.INTERNAL_IMAGE_NAMESPACE }}/workers"

  cleanup:
    needs: preview-context
    if: ${{ needs.preview-context.outputs.should_cleanup == 'true' }}
    runs-on:
      - self-hosted
      - linux
      - internal
    environment: preview
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify internal deploy tooling
        run: |
          helm version
          kubectl version --client=true

      - name: Remove internal preview
        run: |
          helm uninstall "${{ needs.preview-context.outputs.release }}" --namespace "${{ needs.preview-context.outputs.namespace }}" || true
          kubectl delete namespace "${{ needs.preview-context.outputs.namespace }}" --ignore-not-found=true
