name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  javascript:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.10.0"
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser runtime
        run: pnpm test:browser:install

      - name: Run JS/TS quality gates
        run: make ci-js

      - name: Upload browser regression artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-regression-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/python-ci.lock

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          make install-python

      - name: Run Python quality gates
        run: make ci-python

      - name: Upload preprocessing, privacy, governance, and export-hardening regression artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: python-regression-artifacts
          path: |
            api/tests/.artifacts/preprocessing-gold-set
            api/tests/.artifacts/privacy-regression
            api/tests/.artifacts/governance-integrity
            api/tests/.artifacts/export-hardening
          if-no-files-found: ignore

  readiness-audit:
    needs:
      - javascript
      - python
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.10.0"
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/python-ci.lock

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          make install-python

      - name: Run cross-phase readiness audit matrix
        run: make readiness-audit PYTHON=python

      - name: Upload readiness audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: readiness-audit-artifact
          path: output/readiness/latest
          if-no-files-found: error
