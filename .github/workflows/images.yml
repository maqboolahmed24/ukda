name: Images

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            context: .
            dockerfile: web/Dockerfile
          - service: api
            context: ./api
            dockerfile: api/Dockerfile
          - service: workers
            context: .
            dockerfile: workers/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify image build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: ${{ matrix.service == 'workers' }}
          tags: ukde/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Worker image smoke test
        if: matrix.service == 'workers'
        run: |
          docker run --rm ukde/workers:${{ github.sha }} python - <<'PY'
          from dataclasses import replace
          from datetime import UTC, datetime, timedelta
          from uuid import uuid4
          
          from app.core.config import get_settings
          from app.jobs.models import JobRecord
          from app.jobs.service import JobService
          
          
          class FakeStore:
              def __init__(self) -> None:
                  now = datetime.now(UTC)
                  self._job = JobRecord(
                      id=str(uuid4()),
                      project_id="project-smoke",
                      attempt_number=1,
                      supersedes_job_id=None,
                      superseded_by_job_id=None,
                      type="NOOP",
                      dedupe_key="smoke-noop",
                      status="QUEUED",
                      attempts=0,
                      max_attempts=1,
                      payload_json={
                          "logical_key": "smoke-noop",
                          "mode": "SUCCESS",
                          "delay_ms": 0,
                      },
                      created_by="worker-smoke",
                      created_at=now,
                      started_at=None,
                      finished_at=None,
                      canceled_by=None,
                      canceled_at=None,
                      error_code=None,
                      error_message=None,
                      cancel_requested_by=None,
                      cancel_requested_at=None,
                      lease_owner_id=None,
                      lease_expires_at=None,
                      last_heartbeat_at=None,
                  )
          
              def count_open_jobs(self) -> int:
                  return 1 if self._job.status == "QUEUED" else 0
          
              def claim_next_job(self, *, worker_id: str, lease_seconds: int) -> JobRecord | None:
                  if self._job.status != "QUEUED":
                      return None
                  now = datetime.now(UTC)
                  self._job = replace(
                      self._job,
                      status="RUNNING",
                      attempts=self._job.attempts + 1,
                      started_at=now,
                      lease_owner_id=worker_id,
                      lease_expires_at=now + timedelta(seconds=lease_seconds),
                      last_heartbeat_at=now,
                  )
                  return self._job
          
              def heartbeat_job(self, *, job_id: str, worker_id: str, lease_seconds: int) -> bool:
                  del lease_seconds
                  return (
                      self._job.id == job_id
                      and self._job.status == "RUNNING"
                      and self._job.lease_owner_id == worker_id
                  )
          
              def finish_running_job(
                  self,
                  *,
                  job_id: str,
                  worker_id: str,
                  success: bool,
                  error_code: str | None = None,
                  error_message: str | None = None,
              ) -> JobRecord:
                  del worker_id
                  if self._job.id != job_id:
                      raise RuntimeError("Unexpected job id in smoke test.")
                  now = datetime.now(UTC)
                  self._job = replace(
                      self._job,
                      status="SUCCEEDED" if success else "FAILED",
                      finished_at=now,
                      error_code=None if success else (error_code or "SMOKE_FAILED"),
                      error_message=None if success else error_message,
                      lease_owner_id=None,
                      lease_expires_at=None,
                      last_heartbeat_at=None,
                  )
                  return self._job
          
          
          class FakeProjectService:
              def resolve_workspace_context(self, **kwargs):  # type: ignore[no-untyped-def]
                  del kwargs
                  raise RuntimeError("Not used in worker smoke test.")
          
          
          class FakeAuditService:
              def record_event_best_effort(self, **kwargs):  # type: ignore[no-untyped-def]
                  del kwargs
                  return None
          
          
          class FakeTelemetryService:
              def record_queue_depth(self, **kwargs):  # type: ignore[no-untyped-def]
                  del kwargs
                  return None
          
              def record_timeline(self, **kwargs):  # type: ignore[no-untyped-def]
                  del kwargs
                  return None
          
          
          service = JobService(
              settings=get_settings(),
              store=FakeStore(),  # type: ignore[arg-type]
              project_service=FakeProjectService(),  # type: ignore[arg-type]
              audit_service=FakeAuditService(),  # type: ignore[arg-type]
              telemetry_service=FakeTelemetryService(),  # type: ignore[arg-type]
          )
          result = service.run_worker_once(worker_id="smoke-worker", lease_seconds=30)
          assert result is not None
          assert result.status == "SUCCEEDED"
          print("worker-smoke-ok")
          PY

  publish:
    if: ${{ github.event_name != 'pull_request' && vars.INTERNAL_REGISTRY != '' && vars.INTERNAL_IMAGE_NAMESPACE != '' }}
    runs-on:
      - self-hosted
      - linux
      - internal
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            context: .
            dockerfile: web/Dockerfile
          - service: api
            context: ./api
            dockerfile: api/Dockerfile
          - service: workers
            context: .
            dockerfile: workers/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to internal registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.INTERNAL_REGISTRY }}
          username: ${{ secrets.INTERNAL_REGISTRY_USERNAME }}
          password: ${{ secrets.INTERNAL_REGISTRY_PASSWORD }}

      - name: Compute image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            CHANNEL_TAG="main"
          else
            CHANNEL_TAG="${GITHUB_REF_NAME//\//-}"
          fi
          echo "image=${{ vars.INTERNAL_REGISTRY }}/${{ vars.INTERNAL_IMAGE_NAMESPACE }}/${{ matrix.service }}" >> "$GITHUB_OUTPUT"
          echo "tags=${{ vars.INTERNAL_REGISTRY }}/${{ vars.INTERNAL_IMAGE_NAMESPACE }}/${{ matrix.service }}:${SHORT_SHA},${{ vars.INTERNAL_REGISTRY }}/${{ vars.INTERNAL_IMAGE_NAMESPACE }}/${{ matrix.service }}:${CHANNEL_TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish internal image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
