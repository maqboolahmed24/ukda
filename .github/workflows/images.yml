name: Images

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            context: .
            dockerfile: web/Dockerfile
          - service: api
            context: ./api
            dockerfile: api/Dockerfile
          - service: workers
            context: ./workers
            dockerfile: workers/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify image build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ukde/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  publish:
    if: ${{ github.event_name != 'pull_request' && vars.INTERNAL_REGISTRY != '' && vars.INTERNAL_IMAGE_NAMESPACE != '' }}
    runs-on:
      - self-hosted
      - linux
      - internal
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            context: .
            dockerfile: web/Dockerfile
          - service: api
            context: ./api
            dockerfile: api/Dockerfile
          - service: workers
            context: ./workers
            dockerfile: workers/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to internal registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.INTERNAL_REGISTRY }}
          username: ${{ secrets.INTERNAL_REGISTRY_USERNAME }}
          password: ${{ secrets.INTERNAL_REGISTRY_PASSWORD }}

      - name: Compute image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            CHANNEL_TAG="main"
          else
            CHANNEL_TAG="${GITHUB_REF_NAME//\//-}"
          fi
          echo "image=${{ vars.INTERNAL_REGISTRY }}/${{ vars.INTERNAL_IMAGE_NAMESPACE }}/${{ matrix.service }}" >> "$GITHUB_OUTPUT"
          echo "tags=${{ vars.INTERNAL_REGISTRY }}/${{ vars.INTERNAL_IMAGE_NAMESPACE }}/${{ matrix.service }}:${SHORT_SHA},${{ vars.INTERNAL_REGISTRY }}/${{ vars.INTERNAL_IMAGE_NAMESPACE }}/${{ matrix.service }}:${CHANNEL_TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish internal image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
