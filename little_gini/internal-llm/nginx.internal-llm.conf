server {
  listen 8011;
  server_name _;

  client_max_body_size 64m;

  # UKDE service-map expects /health; engine exposes /v1/*.
  location = /health {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_pass http://internal-llm-engine:8000/v1/models;
  }

  location /v1/ {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://internal-llm-engine:8000;
  }
}
