services:
  internal-llm-engine:
    image: ${INTERNAL_LLM_IMAGE:-ghcr.io/ggml-org/llama.cpp@sha256:93b95b367a10b6e417abc1974f2e1f376df3ff6fc8723f90080daa160f60d9a5}
    platform: ${INTERNAL_LLM_PLATFORM:-linux/arm64}
    command:
      - --host
      - 0.0.0.0
      - --port
      - ${INTERNAL_LLM_ENGINE_PORT:-8000}
      - --model
      - /models/${INTERNAL_LLM_MODEL_SUBPATH:-qwen/qwen2.5-1.5b-instruct}/${INTERNAL_LLM_MODEL_FILE:-qwen2.5-1.5b-instruct-q4_k_m.gguf}
      - --alias
      - ${INTERNAL_LLM_MODEL_ALIAS:-Qwen2.5-1.5B-Instruct}
      - --ctx-size
      - ${INTERNAL_LLM_N_CTX:-4096}
      - --threads
      - ${INTERNAL_LLM_THREADS:-8}
      - --batch-size
      - ${INTERNAL_LLM_N_BATCH:-512}
      - --no-warmup
    volumes:
      - ${MODEL_ARTIFACT_ROOT}:/models:ro
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:${INTERNAL_LLM_ENGINE_PORT:-8000}/v1/models >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  internal-llm-gateway:
    image: nginx:1.27-alpine
    depends_on:
      internal-llm-engine:
        condition: service_healthy
    ports:
      - ${INTERNAL_LLM_LISTEN_HOST:-127.0.0.1}:${INTERNAL_LLM_LISTEN_PORT:-8011}:8011
    volumes:
      - ./nginx.internal-llm.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
