services:
  internal-ner-engine:
    build:
      context: .
      dockerfile: Dockerfile.internal-ner
      args:
        BASE_IMAGE: ${INTERNAL_NER_BASE_IMAGE:-python:3.11-slim@sha256:d64a1009c676551d50bdd2a0f9a4a5f63423a5f070d9284e00e4cba788953f4b}
    image: ${INTERNAL_NER_IMAGE_NAME:-ukda/internal-ner:arm64}
    platform: ${INTERNAL_NER_PLATFORM:-linux/arm64}
    environment:
      NER_MODEL_DIR: /models/${INTERNAL_NER_MODEL_SUBPATH:-gliner/gliner-small-v2.1}
      NER_MODEL_ALIAS: ${INTERNAL_NER_MODEL_ALIAS:-GLiNER-small-v2.1}
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
    ports:
      - ${INTERNAL_NER_LISTEN_HOST:-127.0.0.1}:${INTERNAL_NER_LISTEN_PORT:-8020}:8000
    volumes:
      - ${MODEL_ARTIFACT_ROOT}:/models:ro
    restart: unless-stopped
