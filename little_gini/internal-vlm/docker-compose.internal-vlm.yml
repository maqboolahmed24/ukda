services:
  internal-vlm-engine:
    image: ${INTERNAL_VLM_IMAGE:-ghcr.io/ggml-org/llama.cpp@sha256:93b95b367a10b6e417abc1974f2e1f376df3ff6fc8723f90080daa160f60d9a5}
    platform: ${INTERNAL_VLM_PLATFORM:-linux/arm64}
    command:
      - --host
      - 0.0.0.0
      - --port
      - ${INTERNAL_VLM_ENGINE_PORT:-8000}
      - --model
      - /models/${INTERNAL_VLM_MODEL_SUBPATH:-qwen/qwen2.5-vl-3b-instruct}/${INTERNAL_VLM_MODEL_FILE:-Qwen2.5-VL-3B-Instruct-q4_k_m.gguf}
      - --alias
      - ${INTERNAL_VLM_MODEL_ALIAS:-Qwen2.5-VL-3B-Instruct}
      - --ctx-size
      - ${INTERNAL_VLM_N_CTX:-4096}
      - --threads
      - ${INTERNAL_VLM_THREADS:-8}
      - --batch-size
      - ${INTERNAL_VLM_N_BATCH:-512}
      - --no-warmup
    volumes:
      - ${MODEL_ARTIFACT_ROOT}:/models:ro
    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://localhost:${INTERNAL_VLM_ENGINE_PORT:-8000}/v1/models >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  internal-vlm-gateway:
    build:
      context: .
      dockerfile: Dockerfile.internal-vlm-gateway
      args:
        BASE_IMAGE: ${INTERNAL_VLM_GATEWAY_BASE_IMAGE:-python:3.11-slim@sha256:d64a1009c676551d50bdd2a0f9a4a5f63423a5f070d9284e00e4cba788953f4b}
    image: ${INTERNAL_VLM_GATEWAY_IMAGE_NAME:-ukda/internal-vlm-gateway:arm64}
    platform: ${INTERNAL_VLM_PLATFORM:-linux/arm64}
    depends_on:
      internal-vlm-engine:
        condition: service_healthy
    environment:
      VLM_GATEWAY_ENGINE_BASE_URL: http://internal-vlm-engine:${INTERNAL_VLM_ENGINE_PORT:-8000}
      VLM_GATEWAY_KRAKEN_BASE_URL: ${INTERNAL_VLM_KRAKEN_BASE_URL:-http://host.docker.internal:8040}
      VLM_GATEWAY_TIMEOUT_SECONDS: ${INTERNAL_VLM_GATEWAY_TIMEOUT_SECONDS:-180}
      VLM_GATEWAY_MODEL_ALIAS: ${INTERNAL_VLM_MODEL_ALIAS:-Qwen2.5-VL-3B-Instruct}
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - ${INTERNAL_VLM_LISTEN_HOST:-127.0.0.1}:${INTERNAL_VLM_LISTEN_PORT:-8010}:8010
    restart: unless-stopped
